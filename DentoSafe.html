/* ═══════════════════════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════════════════════ */
function parseFollowUpDays(text) {
  const t = text.split('—')[0].trim().toLowerCase();
  const m = t.match(/(\d+(?:\.\d+)?)\s*(day|week|month|year)/);
  if (!m) return null;
  const n = parseFloat(m[1]);
  if (m[2].startsWith('day'))   return n;
  if (m[2].startsWith('week'))  return n * 7;
  if (m[2].startsWith('month')) return n * 30;
  if (m[2].startsWith('year'))  return n * 365;
  return null;
}

function buildICS(injuryLabel, followUpSchedule) {
  const now = new Date();
  const stamp = now.toISOString().replace(/[-:.]/g,'').slice(0,15)+'Z';
  const events = followUpSchedule.map((fu, i) => {
    const days = parseFollowUpDays(fu);
    if (!days) return '';
    const d = new Date(now);
    d.setDate(d.getDate() + Math.round(days));
    const dateStr = d.toISOString().split('T')[0].replace(/-/g,'');
    const uid = `dentosafe-${now.getTime()}-${i}@app`;
    const desc = fu.replace(/,/g,'\\,').replace(/\n/g,'\\n');
    return ['BEGIN:VEVENT',`UID:${uid}`,`DTSTAMP:${stamp}`,
      `DTSTART;VALUE=DATE:${dateStr}`,`DTEND;VALUE=DATE:${dateStr}`,
      `SUMMARY:DentoSafe – ${injuryLabel} Follow-up`,`DESCRIPTION:${desc}`,
      'END:VEVENT'].join('\r\n');
  }).filter(Boolean).join('\r\n');
  return ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//DentoSafe//IADT2020//EN',
    events,'END:VCALENDAR'].join('\r\n');
}

function downloadICS(content, filename) {
  const blob = new Blob([content], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

/* ═══════════════════════════════════════════════════════════════
   AVULSION TIMER  (improvement #2)
═══════════════════════════════════════════════════════════════ */
function AvulsionTimer() {
  const [elapsed, setElapsed] = React.useState(0);
  const start = React.useRef(Date.now());

  React.useEffect(() => {
    const id = setInterval(() => setElapsed(Math.floor((Date.now() - start.current) / 1000)), 1000);
    return () => clearInterval(id);
  }, []);

  const mins = Math.floor(elapsed / 60);
  const secs = elapsed % 60;
  const isDanger  = mins >= 60;
  const isWarning = mins >= 30 && !isDanger;

  const colors = isDanger  ? 'bg-red-50 border-red-400 text-red-800' :
                 isWarning ? 'bg-amber-50 border-amber-400 text-amber-800' :
                             'bg-green-50 border-green-400 text-green-800';
  const msg = isDanger  ? '⚠ Over 60 min — PDL cells likely non-viable. Use the Dry >60 min protocol.' :
              isWarning ? '⚠ Approaching the 60-minute limit — act as fast as possible.' :
                          '✓ Within the 60-minute window — replant now for the best outcome.';

  return (
    <div className={`rounded-xl border-2 p-4 mb-4 ${colors}`}>
      <div className="text-xs font-bold uppercase tracking-wider mb-1">⏱ Time since app opened</div>
      <div className="text-4xl font-bold font-mono tracking-widest">
        {String(mins).padStart(2,'0')}:{String(secs).padStart(2,'0')}
      </div>
      <p className="text-sm mt-1 font-medium">{msg}</p>
      <p className="text-xs mt-1 opacity-60">Note: actual extra-oral time may be longer than this timer.</p>
    </div>
  );
}

  return (
    <div className="fade-in bg-white rounded-2xl border border-medical-100 shadow-sm overflow-hidden print-card">
      <div className={`px-5 py-4 ${cfg.bg} border-b ${cfg.border}`}>
        <button onClick={onBack} className={`text-sm font-semibold ${cfg.text} bg-white bg-opacity-60 hover:bg-opacity-90 mb-4 flex items-center gap-2 px-4 py-2 rounded-xl border border-current border-opacity-20 hover:border-opacity-40 transition-all no-print`}>
          ‹ Back
        </button>
        <div className="flex items-center gap-4">
          <InjuryDiagram injuryKey={injuryKey} />
          <div>
            <div className="flex items-center gap-2 mb-1 flex-wrap">
              <h2 className="text-xl font-bold text-medical-900">{injury.label}</h2>
              <SeverityBadge severity={injury.severity} />
            </div>
            <p className="text-sm text-medical-600">{injury.description}</p>
          </div>
        </div>
      </div>

      <div className="p-5 space-y-5">
        {/* When to see a dentist */}
        <div className={`rounded-xl p-4 ${urgency.color} flex items-center gap-3`}>
          <span className="text-2xl">🏥</span>
          <div>
            <div className="font-extrabold text-lg tracking-wide">{urgency.label}</div>
            <div className="text-sm opacity-90">{urgency.sub}</div>
          </div>
        </div>

        {/* Avulsion timer */}
        {isAvulsion && <AvulsionTimer />}

        {/* What to do right now */}
        <div>
          <h3 className="text-sm font-bold text-gray-700 mb-3 uppercase tracking-wider">What to do right now</h3>
          <ol className="space-y-3">
            {(injury.parentActions || injury.immediateActions).map((action, i) => (
              <li key={i} className="flex gap-3">
                <span className="flex-shrink-0 w-7 h-7 rounded-full bg-amber-500 text-white text-sm flex items-center justify-center font-bold">{i+1}</span>
                <span className="pt-0.5 text-gray-800 text-sm leading-relaxed">{action}</span>
              </li>
            ))}
          </ol>
        </div>

        {/* Primary avulsion: do NOT replant notice */}
        {injuryKey === 'avulsion' && (
          <div className="rounded-xl bg-red-50 border border-red-200 p-4">
            <p className="text-sm font-bold text-red-700">⚠ For baby teeth only: do NOT put the tooth back</p>
            <p className="text-xs text-red-600 mt-1">Replanting a baby tooth can damage the permanent adult tooth growing underneath.</p>
          </div>
        )}

        {/* Disclaimer */}
        <p className="text-xs text-gray-400 text-center pt-2">
          This is first-aid guidance only. Always seek professional dental care.
        </p>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   CLINICAL PROTOCOL PANEL  (dentist mode — improvement #4 + #5)
═══════════════════════════════════════════════════════════════ */
function ProtocolPanel({ injury, injuryKey, onBack }) {
  const [tab, setTab] = React.useState('treatment');
  const cfg = severityConfig[injury.severity] || severityConfig.low;
  const isAvulsion = !!injury.extraoralTime;

  const handlePrint = () => window.print();

  const handleICS = () => {
    const ics = buildICS(injury.label, injury.followUp);
    downloadICS(ics, `DentoSafe_${injuryKey}_followup.ics`);
  };

  return (
    <div className="fade-in bg-white rounded-2xl border border-medical-100 shadow-sm overflow-hidden print-card">
      {/* Header */}
      <div className={`px-5 py-4 ${cfg.bg} border-b ${cfg.border}`}>
        <div className="flex items-center justify-between mb-3 no-print">
          <button onClick={onBack} className={`text-sm font-semibold ${cfg.text} bg-white bg-opacity-60 hover:bg-opacity-90 flex items-center gap-2 px-4 py-2 rounded-xl border border-current border-opacity-20 hover:border-opacity-40 transition-all`}>
            ‹ Back to injury list
          </button>
          <div className="flex items-center gap-2">
            <button
              onClick={handleICS}
              title="Export follow-up schedule as calendar (.ics)"
              className="text-xs bg-white text-medical-600 border border-medical-200 px-3 py-1.5 rounded-lg hover:bg-medical-50 flex items-center gap-1 font-medium"
            >
              📅 Export Calendar
            </button>
            <button
              onClick={handlePrint}
              title="Print this protocol"
              className="text-xs bg-white text-medical-600 border border-medical-200 px-3 py-1.5 rounded-lg hover:bg-medical-50 flex items-center gap-1 font-medium"
            >
              🖨 Print
            </button>
          </div>
        </div>

        <div className="flex items-start gap-4">
          <InjuryDiagram injuryKey={injuryKey} />
          <div>
            <div className="flex items-center gap-2 mb-1 flex-wrap">
              <h2 className="text-xl font-bold text-medical-900">{injury.label}</h2>
              <SeverityBadge severity={injury.severity} />
            </div>
            <p className="text-sm text-medical-600">{injury.description}</p>
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div className="flex border-b border-medical-100 bg-medical-50 px-4 no-print">
        {['treatment','splinting','followup'].map(t => (
          <button
            key={t}
            onClick={() => setTab(t)}
            className={`px-4 py-3 text-xs font-semibold capitalize tracking-wide border-b-2 transition-colors ${
              tab === t ? 'border-medical-500 text-medical-700' : 'border-transparent text-medical-400 hover:text-medical-600'
            }`}
          >
            {t === 'followup' ? 'Follow-up' : t.charAt(0).toUpperCase() + t.slice(1)}
          </button>
        ))}
      </div>

      <div className="p-5">

        {/* TREATMENT TAB */}
        {tab === 'treatment' && (
          <div className="fade-in">
            <h3 className="text-xs font-semibold text-medical-700 mb-3 uppercase tracking-wider">Immediate Actions</h3>
            <ol className="space-y-2">
              {injury.immediateActions.map((action, i) => (
                <li key={i} className="flex gap-3 text-sm text-medical-800">
                  <span className="flex-shrink-0 w-6 h-6 rounded-full bg-medical-600 text-white text-xs flex items-center justify-center font-bold">{i+1}</span>
                  <span className="pt-0.5 leading-relaxed">{action}</span>
                </li>
              ))}
            </ol>

            {isAvulsion && (
              <div className="mt-6">
                <h3 className="text-xs font-semibold text-medical-700 mb-3 uppercase tracking-wider">Extra-oral Time Protocols</h3>
                <div className="grid gap-3">
                  {Object.values(injury.extraoralTime).map((scenario, i) => (
                    <div key={i} className="rounded-xl border border-medical-200 p-4">
                      <div className="font-semibold text-medical-800 text-sm mb-2">{scenario.label}</div>
                      <ul className="space-y-1">
                        {scenario.protocol.map((step, j) => (
                          <li key={j} className="text-xs text-medical-600 flex gap-2">
                            <span className="text-medical-400 flex-shrink-0">•</span>{step}
                          </li>
                        ))}
                      </ul>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {injury.prognosis && (
              <div className="mt-5 p-4 rounded-xl bg-medical-50 border border-medical-100">
                <div className="text-xs font-semibold text-medical-600 mb-1 uppercase tracking-wider">Prognosis</div>
                <p className="text-sm text-medical-800">{injury.prognosis}</p>
              </div>
            )}
          </div>
        )}

        {/* SPLINTING TAB */}
        {tab === 'splinting' && (
          <div className="fade-in">
            <h3 className="text-xs font-semibold text-medical-700 mb-3 uppercase tracking-wider">Splinting Protocol</h3>
            <div className="p-4 rounded-xl bg-medical-50 border border-medical-200 text-sm text-medical-800">
              {injury.splinting}
            </div>
            <div className="mt-4 p-4 rounded-xl bg-yellow-50 border border-yellow-200">
              <div className="text-xs font-semibold text-yellow-700 mb-1">Note</div>
              <p className="text-xs text-yellow-700">Always use flexible (physiological) splinting unless otherwise specified. Rigid splinting is contraindicated in most cases except cervical root fractures and alveolar fractures.</p>
            </div>
          </div>
        )}

        {/* FOLLOW-UP TAB */}
        {tab === 'followup' && (
          <div className="fade-in">
            <div className="flex items-center justify-between mb-3">
              <h3 className="text-xs font-semibold text-medical-700 uppercase tracking-wider">Follow-up Schedule</h3>
              <button
                onClick={handleICS}
                className="no-print text-xs bg-medical-600 text-white px-3 py-1.5 rounded-lg hover:bg-medical-700 flex items-center gap-1 font-medium"
              >
                📅 Add to Calendar
              </button>
            </div>
            <div className="space-y-2">
              {injury.followUp.map((fu, i) => (
                <div key={i} className="flex items-start gap-2.5 px-3 py-2 rounded-lg bg-medical-50 border border-medical-100">
                  <span className="w-5 h-5 rounded-full bg-medical-500 text-white text-xs flex items-center justify-center font-bold flex-shrink-0 mt-0.5">{i+1}</span>
                  <span className="text-xs text-medical-700 leading-relaxed">{fu}</span>
                </div>
              ))}
            </div>
            <div className="mt-4 p-4 rounded-xl border border-medical-100 bg-medical-50">
              <div className="text-xs font-semibold text-medical-600 mb-2 uppercase tracking-wider">At each visit, assess:</div>
              <ul className="space-y-1 text-xs text-medical-700">
                <li className="flex gap-2"><span>•</span>Pulp vitality (EPT / thermal testing)</li>
                <li className="flex gap-2"><span>•</span>Periapical radiograph</li>
                <li className="flex gap-2"><span>•</span>Signs of root resorption or periapical infection</li>
                <li className="flex gap-2"><span>•</span>Mobility and percussion response</li>
                <li className="flex gap-2"><span>•</span>Patient symptoms / discolouration</li>
              </ul>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════════════════════════ */
function App() {
  const [userMode, setUserMode]         = React.useState(null);       // 'dentist' | 'parent'
  const [toothType, setToothType]       = React.useState(null);       // 'permanent' | 'primary'
  const [selectedInjury, setSelectedInjury] = React.useState(null);

  const handleQuickAvulsion = () => {
    setToothType('permanent');
    setSelectedInjury('avulsion');
  };

  const handleResetMode = () => {
    setUserMode(null);
    setToothType(null);
    setSelectedInjury(null);
  };

  const injuries = toothType ? clinicalData[toothType] : {};
  const isParent = userMode === 'parent';

  if (!userMode) {
    return <ModeSelectScreen onSelect={setUserMode} />;
  }

  return (
    <div className="min-h-screen flex flex-col">
      <EmergencyBanner onQuickAvulsion={handleQuickAvulsion} mode={userMode} />
      <Header mode={userMode} onResetMode={handleResetMode} />

      <main className="flex-1 max-w-3xl mx-auto w-full px-4 py-6 space-y-6">

        {/* Step 1 — Tooth Type */}
        {!selectedInjury && (
          <section>
            <div className="flex items-center gap-2 mb-3 no-print">
              <span className="w-6 h-6 rounded-full bg-medical-600 text-white text-xs flex items-center justify-center font-bold">1</span>
              <h2 className="font-semibold text-medical-800">Select Tooth Type</h2>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <ToothTypeCard type="permanent" label="Permanent" subtitle="Age 6+ · Adult dentition" icon="🦷"
                selected={toothType === 'permanent'} onClick={() => { setToothType('permanent'); setSelectedInjury(null); }} />
              <ToothTypeCard type="primary" label="Primary" subtitle="Age 0–6 · Baby teeth" icon="🐣"
                selected={toothType === 'primary'} onClick={() => { setToothType('primary'); setSelectedInjury(null); }} />
            </div>
          </section>
        )}

        {/* Step 2 — Injury Type */}
        {toothType && !selectedInjury && (
          <section className="fade-in">
            <div className="flex items-center gap-2 mb-3 no-print">
              <span className="w-6 h-6 rounded-full bg-medical-600 text-white text-xs flex items-center justify-center font-bold">2</span>
              <h2 className="font-semibold text-medical-800">Select Injury Type</h2>
            </div>
            <div className="space-y-2">
              {Object.entries(injuries).map(([key, injury]) => (
                <InjuryCard key={key} injury={injury} injuryKey={key} onClick={() => setSelectedInjury(key)} />
              ))}
            </div>
          </section>
        )}

        {/* Step 3 — Protocol */}
        {toothType && selectedInjury && (
          <section className="fade-in">
            <div className="flex items-center gap-2 mb-3 no-print">
              <span className="w-6 h-6 rounded-full bg-medical-600 text-white text-xs flex items-center justify-center font-bold">3</span>
              <h2 className="font-semibold text-medical-800">
                {isParent ? 'What To Do' : 'Clinical Protocol'}
              </h2>
            </div>
            {isParent
              ? <ParentProtocolPanel injury={injuries[selectedInjury]} injuryKey={selectedInjury} onBack={() => setSelectedInjury(null)} />
              : <ProtocolPanel       injury={injuries[selectedInjury]} injuryKey={selectedInjury} onBack={() => setSelectedInjury(null)} />
            }
          </section>
        )}

        {/* Empty state */}
        {!toothType && (
          <div className="text-center py-12 text-medical-400">
            <div className="text-5xl mb-4">🦷</div>
            <p className="text-sm">Select a tooth type above to begin.</p>
            <p className="text-xs mt-1 text-medical-300">Powered by IADT 2020 Clinical Guidelines</p>
          </div>
        )}

      </main>

      <footer className="text-center py-4 text-xs text-medical-300 border-t border-medical-100 bg-white no-print">
        DentoSafe · IADT 2020 · For clinical reference only — always apply professional judgment
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
